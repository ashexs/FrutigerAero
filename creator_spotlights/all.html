<!doctype html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Frutiger Aero - All Creator Highlights</title>
    <meta
      name="description"
      content="All the Featured Artists in the Frutiger Aero Community throughout the years."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="icon"
      type="image/png"
      href="/images/favicon/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="shortcut icon" href="/images/favicon/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/images/favicon/apple-touch-icon.png"
    />
    <meta name="apple-mobile-web-app-title" content="FrutAero" />
    <link rel="manifest" href="/images/favicon/site.webmanifest" />
    <link
      rel="canonical"
      href="https://frutigeraero.org/creator_spotlights/all"
    />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/blogs.css" />
    <noscript>
      <style>
        #newsHeader {
          flex-direction: column;
        }
        .js-rss {
          display: none !important;
        }
        .no-js-rss {
          display: inline-block !important;
        }
      </style>
    </noscript>
  </head>

  <body>
    <div id="background"></div>
    <div id="siteContainer">
      <div class="website-spacer-top"></div>
      <!-- Main Navigation Bar -->
      <nav
        id="mainNav"
        class="containers-style flex-center buttons-no-underline"
        aria-label="Main Navigation"
      >
        <div class="nav-side-vertical-separators vertical-separators"></div>

        <div class="main-nav-mobile-divs">
          <!-- Community Link -->
          <a
            href="/community_highlights"
            class="main-nav-links button-links-inactive flex-center"
          >
            <img
              src="../images/navbar/inactive/back.png"
              alt="Community Logo"
              class="main-nav-images"
            />
            <span>Back to Highlights</span>
          </a>
          <div class="vertical-separators"></div>

          <!-- Home Link -->
          <a
            href="/"
            class="main-nav-home main-nav-links button-links-inactive flex-center"
          >
            <img src="/images/navbar/inactive/home.svg" alt="Home Logo" />
            <span class="home-nav-text">Home</span>
          </a>
        </div>
        <div class="nav-side-vertical-separators vertical-separators"></div>
      </nav>

      <!-- Main Content Area -->
      <main id="mainContent">
        <section id="communitySection" class="margin-top">
          <header
            id="newsHeader"
            class="containers-style border-radius-top flex-center"
          >
            <h1>All Creator Spotlights</h1>

            <!-- RSS Button - JavaScript Disabled -->
            <div class="no-js-rss" style="display: none">
              <span>RSS Feed URL: </span>
              <a
                href="/rss/creator_spotlights.xml"
                target="_blank"
                title="Copy RSS Feed URL to clipboard"
              >
                https://frutigeraero.org/rss/creator_spotlights.xml
              </a>
            </div>
          </header>

          <article class="containers-style-content buttons-no-underline">
            <div class="blog-entry-text">
              <a href="/creator_spotlights/2026">2026</a>
            </div>
          </article>

          <article
            class="containers-style-content buttons-no-underline border-radius-bottom"
          >
            <div class="blog-entry-text">
              <a href="/creator_spotlights/2025">2025</a>
            </div>
          </article>
        </section>
      </main>
      <div class="website-spacer-bottom"></div>
    </div>

    <!-- Music Player -->
    <div id="musicBar" class="containers-style">
      <button
        class="button-links-active"
        id="musicToggle"
        aria-label="Toggle Music"
      >
        <img
          src="../images/music_on.svg"
          alt="Music Status"
          id="musicToggleImg"
        />
      </button>
      <div class="vertical-separators"></div>
      <div class="music-text-div">
        <div class="music-inner-text">
          <audio
            id="songAudio"
            loop
            data-title="NetMetro"
            data-artist="MetalJack98"
          >
            <source src="/music/creator_spotlights/all.mp3" type="audio/mpeg" />
          </audio>
          <span id="songTitle"></span>
          <span>—</span>
          <span id="songArtist"></span>
        </div>
      </div>
    </div>

    <!-- Javascript -->
    <script src="../javascript/scripts.js" async defer></script>
  </body>
</html>
